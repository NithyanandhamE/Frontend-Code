<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captcha form</title>
</head>
<body>

    <h2>Captcha Form</h2>

    <form>
        <label for="captcha">Enter Captcha: </label>
        <input type="text" id="captcha" placeholder="Enter Captcha Here" name="captcha"> 
        <br>
        <br>

        <label for="username">UserName:</label>
        <input type = "text" id = "username" placeholder="Enter UserName Here" name="username">
        <br>
        <br>

        <label>Email :</label>
        <input type="email" name="email">

         <br>
         <br>

         <label>Password: <span style="color:red;">*</span></label>
         <input type="password" name="pwd" required>

         <br> 
         <br>

         <label for="mobile">Mobile :</label>
         <input type="tel" id="mobile" name="mobile" placeholder="Enter mobile number" required>

         <br><br>

         <label for="age">Age :</label>
         <input type="number" id="age" name="age" min="1" max="150" required>

         <br><br>

        <input type="submit"> &nbsp;&nbsp;&nbsp;&nbsp;
        <input type="reset" value="Cancel">

         <button type="reset">Cancel Button</button>

    </form>

</body>
</html>
