<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
</head>
<body>

    <h2>Student Registration Form</h2>

    <form action="#" method="post" autocomplete="on">

        <!-- Personal Information -->
        <fieldset>
            <legend>Personal Information</legend>

            <input type="hidden" name="form_id" value="12345">

            <label>Full Name:</label>
            <input type="text" name="name" placeholder="Enter your name" required autofocus><br><br>

            <label>Email:</label>
            <input type="email" name="email" required><br><br>

            <label>Password:</label>
            <input type="password" name="password" required><br><br>

            <label>Phone:</label>
            <input type="tel" name="phone" placeholder="10 digit number" pattern="[0-9]{10}" required><br><br>

            <label>Website:</label>
            <input type="url" name="website" placeholder="https://example.com"><br><br>

            <label>Search Course:</label>
            <input type="search" placeholder="Search..."><br><br>
        </fieldset>

        <br>

        <!-- Other Details -->
        <fieldset>
            <legend>Other Details</legend>

            <label>Age:</label>
            <input type="number" name="age"><br><br>

            <label>Date of Birth:</label>
            <input type="date" name="dob"><br><br>

            <label>Preferred Time:</label>
            <input type="time" name="time"><br><br>

            <label>Meeting Date & Time:</label>
            <input type="datetime-local" name="meeting"><br><br>

            <label>Gender:</label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female<br><br>

            <label>Hobbies:</label>
            <input type="checkbox"> Reading
            <input type="checkbox"> Sports<br><br>

            <label>Favorite Color:</label>
            <input type="color"><br><br>

            <label>Skill Level:</label>
            <input type="range" min="0" max="10" value="5">
        </fieldset>

        <br>

        <!-- Selection Section -->
        <fieldset>
            <legend>Selection</legend>

            <label>Course:</label>
            <select name="course">
                <option>HTML</option>
                <option>CSS</option>
                <option>JavaScript</option>
            </select><br><br>

            <label>City:</label>
            <input type="text" name="city"><br><br>

            <label>Upload Photo:</label>
            <input type="file" name="photo"><br><br>
        </fieldset>

        <br>

        <!-- Comments Section -->
        <fieldset>
            <legend>Comments</legend>

            <textarea rows="4" cols="40" placeholder="Write your comments"></textarea>
        </fieldset>

        <br>

        <!-- Buttons -->
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
        <input type="button" value="Disabled Button" disabled>

    </form>

</body>
</html>
