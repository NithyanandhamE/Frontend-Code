<!DOCTYPE html>
<html lang="en">
<head>
    <title>div example</title>
</head>
<body>

    <!-- Block level Element - div, pre, p, h1 - h6 -->
    <div>Hello</div>
    <div>Hi</div>

    <p>Hello</p>
    <p>hi</p>

    <!-- Inline level Elements - span, a, img, u, sub, sup -->
    <span>Hello Everyone</span>
    <span>Hi</span>

    <p>
        Feb Batch students are very 
        <span style="color: red;">Knowledgeble</span>
    </p>

</body>
</html>
