<html>
<head>
    <title>Rowspan and Colspan Example</title>
</head>
<body>

<table border="1" width="80%" cellspacing="0" cellpadding="10">

    <!-- Top full row -->
    <tr>
        <td colspan="4" align="center">1</td>
    </tr>

    <!-- Middle section -->
    <tr>
        <!-- Left side rowspan -->
        <td rowspan="2">1</td>

        <!-- Center normal cells -->
        <td>2</td>
        <td>3</td>

        <!-- Right side rowspan -->
        <td rowspan="2">4</td>
    </tr>

    <tr>
        <td>2</td>
        <td>3</td>
    </tr>

    <!-- Bottom full row -->
    <tr>
        <td colspan="4" align="center">1</td>
    </tr>

</table>

</body>
</html>
